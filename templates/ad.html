{% set slot = slot or "1476762689" %}

<div class="ad-wrapper">
  {% if IS_PROD %}
    <ins class="adsbygoogle"
         style="display:block;width:160px;height:600px;"
         data-ad-client="ca-pub-2187075822443464"
         data-ad-slot="{{ slot }}">
    </ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  {% else %}
    <div style="width:160px;height:600px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#999;border:1px dashed #ccc;">
      Ad Slot: {{ slot }}
    </div>
  {% endif %}
</div>
